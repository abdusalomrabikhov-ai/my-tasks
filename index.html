<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Задачи">
<meta name="theme-color" content="#F7F5F0">
<title>Мои задачи</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #F7F5F0;
  --card:   #FFFFFF;
  --border: #E2DDD5;
  --text:   #1A1714;
  --text2:  #A09A8E;
  --text3:  #C5BFB5;
  --chip:   #ECEAE4;
  --accent: #1A1714;
  --danger-bg: #FFF8F7;
  --danger-border: #F5C4B3;
  --warn-bg: #FFFBF2;
  --warn-border: #FAC775;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg:     #141210;
    --card:   #1E1C19;
    --border: #2E2B27;
    --text:   #F0EDE8;
    --text2:  #7A7469;
    --text3:  #4A4540;
    --chip:   #252320;
    --accent: #F0EDE8;
    --danger-bg: #231510;
    --danger-border: #5A2A1A;
    --warn-bg: #201A08;
    --warn-border: #5A4010;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { background: var(--bg); color: var(--text); font-family: 'DM Sans', -apple-system, sans-serif; min-height: 100vh; }

.topbar {
  background: var(--bg);
  position: sticky; top: 0; z-index: 10;
  padding: env(safe-area-inset-top, 44px) 24px 0;
  border-bottom: 1px solid var(--border);
}
.topbar-inner { padding-bottom: 14px; }
.top-day { font-size: 11px; font-weight: 500; letter-spacing: 0.12em; color: var(--text2); text-transform: uppercase; margin-bottom: 4px; }
.top-title { font-family: 'DM Serif Display', serif; font-size: 34px; color: var(--text); line-height: 1.05; letter-spacing: -0.5px; }
.top-date { font-size: 13px; color: var(--text2); margin-top: 4px; font-weight: 300; }

.stats-row { display: flex; margin: 20px 24px 0; border: 1px solid var(--border); border-radius: 14px; overflow: hidden; background: var(--card); }
.stat { flex: 1; padding: 14px 0; text-align: center; border-right: 1px solid var(--border); }
.stat:last-child { border-right: none; }
.stat-n { font-family: 'DM Serif Display', serif; font-size: 28px; color: var(--text); line-height: 1; }
.stat-l { font-size: 10px; letter-spacing: 0.09em; text-transform: uppercase; color: var(--text2); margin-top: 3px; font-weight: 500; }

.add-wrap { margin: 16px 24px 0; }
.add-inner { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 16px; }
.add-input { width: 100%; background: transparent; border: none; font-size: 16px; font-family: 'DM Sans', sans-serif; color: var(--text); outline: none; padding: 0 0 13px; border-bottom: 1px solid var(--border); font-weight: 300; }
.add-input::placeholder { color: var(--text3); }
.add-controls { display: flex; gap: 8px; align-items: center; padding-top: 13px; flex-wrap: wrap; }
.add-controls select,
.add-controls input[type="datetime-local"] {
  height: 34px; padding: 0 10px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 8px; font-size: 12px;
  font-family: 'DM Sans', sans-serif; color: var(--text2); outline: none;
}
.add-controls select { flex: 1; min-width: 110px; }
.add-controls input[type="datetime-local"] { flex: 1.4; min-width: 150px; }
.add-btn {
  height: 34px; padding: 0 18px;
  background: var(--accent); color: var(--bg);
  border: none; border-radius: 8px;
  font-size: 13px; font-family: 'DM Sans', sans-serif;
  font-weight: 500; cursor: pointer; letter-spacing: 0.02em;
  flex-shrink: 0;
}
.add-btn:active { opacity: 0.75; }

.filters { display: flex; gap: 6px; padding: 18px 24px 0; overflow-x: auto; scrollbar-width: none; }
.filters::-webkit-scrollbar { display: none; }
.chip {
  height: 29px; padding: 0 14px;
  border: 1px solid var(--border); border-radius: 20px;
  font-size: 12px; font-family: 'DM Sans', sans-serif;
  font-weight: 400; background: transparent; color: var(--text2);
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
}
.chip.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

.sec-hdr { font-size: 10px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text2); padding: 20px 24px 10px; }

.task-list { display: flex; flex-direction: column; gap: 7px; padding: 0 24px; margin-bottom: 20px; }

.task-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 14px; padding: 15px 16px;
  display: flex; align-items: flex-start; gap: 13px;
}
.task-card.overdue { background: var(--danger-bg); border-color: var(--danger-border); }
.task-card.soon    { background: var(--warn-bg);   border-color: var(--warn-border); }
.task-card.done-card { opacity: 0.45; }
.task-card:active { opacity: 0.85; }

.cb {
  width: 20px; height: 20px; border-radius: 50%;
  border: 1.5px solid var(--text3); flex-shrink: 0; margin-top: 2px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.15s, border-color 0.15s;
}
.cb.on { background: var(--accent); border-color: var(--accent); }
.cb.on::after {
  content: ''; width: 9px; height: 5px;
  border-left: 1.5px solid var(--bg); border-bottom: 1.5px solid var(--bg);
  transform: rotate(-45deg) translateY(-1px); display: block;
}

.card-body { flex: 1; min-width: 0; }
.card-title { font-size: 15px; font-weight: 400; color: var(--text); line-height: 1.45; letter-spacing: -0.01em; }
.done-card .card-title { text-decoration: line-through; color: var(--text3); }
.card-meta { display: flex; gap: 7px; align-items: center; margin-top: 7px; flex-wrap: wrap; }

.cat-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.cat-dot.work     { background: #378ADD; }
.cat-dot.personal { background: #639922; }
.cat-dot.health   { background: #EF9F27; }
.cat-dot.learning { background: #7F77DD; }
.cat-dot.other    { background: #888780; }

.cat-lbl  { font-size: 11px; color: var(--text2); }
.time-lbl { font-size: 11px; color: var(--text3); }
.time-lbl.overdue { color: #D85A30; }
.time-lbl.soon    { color: #BA7517; }

.gcal-tag {
  font-size: 10px; padding: 2px 8px; border-radius: 6px;
  background: #EEF5FF; color: #185FA5;
  border: none; cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-weight: 500;
}
.gcal-tag.synced { background: #EAF3DE; color: #3B6D11; cursor: default; }
@media (prefers-color-scheme: dark) {
  .gcal-tag         { background: #1A2D44; color: #6AAEFF; }
  .gcal-tag.synced  { background: #1A3028; color: #5DCC88; }
}

.del-btn { background: transparent; border: none; color: var(--text3); cursor: pointer; font-size: 20px; line-height: 1; padding: 0; flex-shrink: 0; }
.del-btn:active { color: var(--text2); }

.empty { text-align: center; padding: 3.5rem 24px; color: var(--text3); font-size: 14px; font-weight: 300; }
.bottom-safe { height: calc(24px + env(safe-area-inset-bottom, 0px)); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="top-day" id="hdr-day"></div>
    <div class="top-title">Мои задачи</div>
    <div class="top-date" id="hdr-date"></div>
  </div>
</div>

<div class="stats-row">
  <div class="stat"><div class="stat-n" id="s-total">0</div><div class="stat-l">всего</div></div>
  <div class="stat"><div class="stat-n" id="s-today">0</div><div class="stat-l">сегодня</div></div>
  <div class="stat"><div class="stat-n" id="s-done">0</div><div class="stat-l">готово</div></div>
</div>

<div class="add-wrap">
  <div class="add-inner">
    <input class="add-input" id="task-input" type="text" placeholder="Что нужно сделать..." />
    <div class="add-controls">
      <select id="task-cat">
        <option value="work">Работа</option>
        <option value="personal">Личное</option>
        <option value="health">Здоровье</option>
        <option value="learning">Обучение</option>
        <option value="other">Другое</option>
      </select>
      <input type="datetime-local" id="task-time" />
      <button class="add-btn" onclick="addTask()">Добавить</button>
    </div>
  </div>
</div>

<div class="filters">
  <button class="chip active" onclick="setFilter('all',this)">Все</button>
  <button class="chip" onclick="setFilter('today',this)">Сегодня</button>
  <button class="chip" onclick="setFilter('active',this)">Активные</button>
  <button class="chip" onclick="setFilter('done',this)">Выполненные</button>
  <button class="chip" onclick="setFilter('overdue',this)">Просроченные</button>
</div>

<div id="pending-wrap">
  <div class="sec-hdr">Активные</div>
  <div class="task-list" id="pending-list"></div>
</div>
<div id="done-wrap" style="display:none">
  <div class="sec-hdr">Выполненные</div>
  <div class="task-list" id="done-list"></div>
</div>
<div class="empty" id="empty-msg" style="display:none">Задач нет — хороший день</div>
<div class="bottom-safe"></div>

<script>
let tasks = [];
try { tasks = JSON.parse(localStorage.getItem('tasks_v3') || '[]'); } catch(e){}
let filter = 'all';
const cats = { work:'Работа', personal:'Личное', health:'Здоровье', learning:'Обучение', other:'Другое' };
const DAYS = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
const MONTHS = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];

function save() { try { localStorage.setItem('tasks_v3', JSON.stringify(tasks)); } catch(e){} }

function fmtTime(iso) {
  if (!iso) return null;
  const d = new Date(iso), now = new Date(), diff = d - now;
  const ts = new Date(); ts.setHours(0,0,0,0);
  const td = new Date(d); td.setHours(0,0,0,0);
  const ddays = Math.round((td - ts) / 86400000);
  const hm = d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
  if (diff < 0) return { text: d.getDate()+' '+MONTHS[d.getMonth()]+', просрочено', cls:'overdue' };
  if (ddays === 0) return { text: 'Сегодня · '+hm, cls:'soon' };
  if (ddays === 1) return { text: 'Завтра · '+hm, cls:'' };
  return { text: d.getDate()+' '+MONTHS[d.getMonth()]+' · '+hm, cls:'' };
}

function addTask() {
  const v = document.getElementById('task-input').value.trim();
  if (!v) return;
  tasks.unshift({ id: Date.now(), title: v, cat: document.getElementById('task-cat').value, time: document.getElementById('task-time').value || null, done: false, synced: false });
  save();
  document.getElementById('task-input').value = '';
  document.getElementById('task-time').value = '';
  render();
}

function toggle(id) { const t = tasks.find(x=>x.id===id); if(t){t.done=!t.done;save();render();} }
function del(id) { tasks=tasks.filter(x=>x.id!==id); save(); render(); }

function syncGcal(id) {
  const t = tasks.find(x=>x.id===id); if(!t||!t.time) return;
  const s = new Date(t.time).toISOString();
  const e = new Date(new Date(t.time).getTime()+3600000).toISOString();
  t.synced = true; save(); render();
  sendPrompt('Создай событие в Google Calendar: "'+t.title+'", категория "'+cats[t.cat]+'", начало '+s+', конец '+e+', напоминание за 30 минут.');
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function getFiltered() {
  const now = new Date();
  const ts = new Date(); ts.setHours(0,0,0,0);
  const te = new Date(); te.setHours(23,59,59,999);
  return tasks.filter(t => {
    if (filter==='active') return !t.done;
    if (filter==='done') return t.done;
    if (filter==='today') return t.time && new Date(t.time)>=ts && new Date(t.time)<=te;
    if (filter==='overdue') return !t.done && t.time && new Date(t.time)<now;
    return true;
  });
}

function cardHTML(t) {
  const tf = t.time ? fmtTime(t.time) : null;
  const over = tf&&tf.cls==='overdue', soon = tf&&tf.cls==='soon';
  const gcal = t.time
    ? (t.synced
        ? `<span class="gcal-tag synced">✓ Calendar</span>`
        : `<button class="gcal-tag" onclick="syncGcal(${t.id})">+ Calendar</button>`)
    : '';
  return `<div class="task-card ${t.done?'done-card':''} ${over?'overdue':soon?'soon':''}">
    <div class="cb ${t.done?'on':''}" onclick="toggle(${t.id})"></div>
    <div class="card-body">
      <div class="card-title">${t.title}</div>
      <div class="card-meta">
        <div class="cat-dot ${t.cat}"></div>
        <span class="cat-lbl">${cats[t.cat]}</span>
        ${tf?`<span class="time-lbl ${tf.cls}">· ${tf.text}</span>`:''}
        ${gcal}
      </div>
    </div>
    <button class="del-btn" onclick="del(${t.id})">×</button>
  </div>`;
}

function render() {
  const f = getFiltered();
  const pending = f.filter(t=>!t.done), done = f.filter(t=>t.done);
  document.getElementById('pending-list').innerHTML = pending.map(cardHTML).join('') || '';
  document.getElementById('done-list').innerHTML   = done.map(cardHTML).join('') || '';
  document.getElementById('done-wrap').style.display  = done.length ? 'block' : 'none';
  document.getElementById('empty-msg').style.display  = f.length===0 ? 'block' : 'none';
  const ts=new Date(); ts.setHours(0,0,0,0);
  const te=new Date(); te.setHours(23,59,59,999);
  document.getElementById('s-total').textContent = tasks.length;
  document.getElementById('s-today').textContent = tasks.filter(t=>t.time&&new Date(t.time)>=ts&&new Date(t.time)<=te&&!t.done).length;
  document.getElementById('s-done').textContent  = tasks.filter(t=>t.done).length;
}

document.getElementById('task-input').addEventListener('keydown', e=>{ if(e.key==='Enter') addTask(); });

const now = new Date();
document.getElementById('hdr-day').textContent  = DAYS[now.getDay()];
document.getElementById('hdr-date').textContent = now.getDate()+' '+MONTHS[now.getMonth()]+' '+now.getFullYear();

render();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
